<script type="module">
  import { QueryEngine } from "https://cdn.jsdelivr.net/npm/@comunica/query-sparql@latest/+esm";

  const engine = new QueryEngine();

  const query = `
    PREFIX ex: <ttps://github.com/dbotteld/HearingThreshold/blob/main/>
    SELECT ?campaign WHERE {
      ?campaign a ex:HearingThresholdMeasurementCampaign ;
                ex:measuredOnTaxon ex:Robin .
    }
  `;

  const result = await engine.queryBindings(query, {
    sources: [
      "https://github.com/dbotteld/HearingThreshold/blob/main/hearing_thresholds.owl"
    ]
  });

  for await (const b of result) {
    console.log(b.get("campaign").value);
  }
</script>
